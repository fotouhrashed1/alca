<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ALCA · Analytical Life Cycle Assessment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="left-section">
    <h1>ALCA · Analytical Life Cycle Assessment</h1>

    <div class="alca-config">
        <div>
            <label>ALCA Objective</label>
            <input type="text" id="alcaObjective" value="Cost Analysis">
        </div>
        <div>
            <label>Default Unit</label>
            <input type="text" id="defaultUnit" value="USD">
        </div>
        <div class="reverse-checkbox-container">
            <label class="checkbox-label">
                <input type="checkbox" id="reverseColorsToggle">
                <span class="checkmark"></span>
                Reverse Colors (Green ↔ Red)
            </label>
        </div>
        <div class="decimal-select-container">
            <label>Decimal Places</label>
            <select id="decimalPrecision">
                <option value="0">0 decimals (whole numbers)</option>
                <option value="1" selected>1 decimal</option>
                <option value="2">2 decimals</option>
            </select>
        </div>
    </div>

    <!-- Threshold Mode Selection -->
    <div class="threshold-mode-section">
        <label class="mode-label">Color Threshold Mode:</label>
        <div class="mode-buttons">
            <label class="mode-option">
                <input type="radio" name="thresholdMode" value="auto" checked> Auto (based on average)
            </label>
            <label class="mode-option">
                <input type="radio" name="thresholdMode" value="manual"> Manual thresholds
            </label>
        </div>
    </div>

    <!-- Manual Threshold Inputs (hidden by default) -->
    <div class="manual-thresholds" id="manualThresholdsPanel" style="display: none;">
        <div class="threshold-input-group">
            <div>
                <label>Lower Threshold (below = Green)</label>
                <input type="number" id="lowerThreshold" step="any" value="0" placeholder="e.g., 50">
                <small>Values below this threshold → Green (or Red if reversed)</small>
            </div>
            <div>
                <label>Upper Threshold (above = Red)</label>
                <input type="number" id="upperThreshold" step="any" value="0" placeholder="e.g., 200">
                <small>Values above this threshold → Red (or Green if reversed)</small>
            </div>
            <div>
                <label>Yellow Range</label>
                <div class="yellow-range-info">
                    Values between Lower and Upper thresholds → Yellow
                </div>
            </div>
        </div>
    </div>

    <table class="alca-table" id="alcaStagesTable">
        <thead>
            <tr><th>Stage #</th><th>Stage Name</th><th>Value</th><th>Unit</th></tr>
        </thead>
        <tbody id="alcaStagesBody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2"><strong>TOTAL</strong></td>
                <td id="alcaTotalValue">0.00</td>
                <td id="alcaTotalUnit">USD</td>
            </tr>
        </tfoot>
    </table>
</div>

<div class="frame-wrapper">
    <div class="frame" id="visualFrame">
        <div class="frame-content">
            <!-- borders always visible -->
            <img src="borders.png" alt="Borders" class="base-image">

            <!-- center circle -->
            <div class="circle">
                <div class="circle-title">ALCA</div>
                <div class="circle-subtitle" id="circleObjectiveText">Cost Analysis</div>
                <div id="alcaCircleTotal">0.00 USD</div>
            </div>

            <!-- overlays container -->
            <div id="alcaOverlaysContainer"></div>
        </div>
    </div>
</div>

<script src="alca-equations.js"></script>
<script src="app.js"></script>
</body>
</html>
